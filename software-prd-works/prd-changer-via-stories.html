<!-- 

PRD for this file.

The purpose of this single-file application is to have a todo-list on one side and a PRD on the other side.

The user can enter user stories in the TODO list.
The user can press "intake" on each of the user stories, and the effect is that the PRD writer agent will look at the existing PRD and the user story and will augment the PRD based on the information in the PRD.
The preview of updated PRD will be shown in a modal.
The user can approve the changes or reject the changes.
If the user approves the changes, the changes will be applied to the PRD.
If the user rejects the changes, the changes will not be applied to the PRD.
The user can edit the PRD in the PRD pane.
The user can edit the user stories in the TODO list.
The user can remove a user story from the TODO list.
The user can add a new user story to the TODO list.

-->

            margin-bottom: 0.75rem;
            color: #2c3e50;
            line-height: 1.5;
        }

        .modal-form {
            display: grid;
            gap: 0.75rem;

        .modal-field label {
            display: block;
            font-weight: 600;

        .modal-field input,
        .modal-field textarea {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

        .modal-field textarea {
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;

        .modal-field input:focus,
        .modal-field textarea:focus {

        .modal-btn {

        .modal-btn.primary:hover {

        .modal-btn.secondary {

        .modal-btn.secondary:hover {

        .modal-btn.danger {

            border: 1px solid rgba(239, 68, 68, 0.22);

            overflow: auto;
            max-height: 45vh;

        /* Diff view toggle buttons */
        .secondary-btn.active {
            background-color: #3498db;
        }
    </style>
    <!-- Robust diffing (jsdiff). Note: often referred to as “jsdiff”; user called it “jdiff”. -->
    <script src="https://cdn.jsdelivr.net/npm/diff@5.2.0/dist/diff.min.js"></script>
</head>

<body>
    <div class="header">
        <h2>Extractor</h2>
        <h4>Extract PRD deltas from User input</h4>
    </div>

    <div class="main-container">
        <div class="pane left-pane">
            <div class="pane-header">
                <span>User Stories</span>
                <div class="header-controls">
                    <div class="hamburger-menu">
                        <button class="hamburger-btn" onclick="toggleMenu()" aria-label="Settings menu">
                            <div class="hamburger-icon">
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>
                            <span>Settings</span>
                        </button>
                        <div id="settingsMenu" class="menu-dropdown">
                            <button class="menu-item" onclick="manageApiKey(); closeMenu();">API Key</button>
                            <button class="menu-item" onclick="manageTrello(); closeMenu();">Trello Key</button>
                        </div>
                    </div>
                    <button id="trelloSyncBtn" class="secondary-btn" onclick="syncFromTrello()">Sync</button>
                </div>
            </div>
            <div class="pane-content">
                <div class="todo-list">
                    <div class="todo-items" id="todoItems">
                        <div class="empty-state">
                            <h3>No User Stories Yet</h3>
                            <p>Click "Add User Story" below to add stories, then click "Intake" on each story to augment
                                the PRD.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="pane right-pane">
            <div class="pane-header">
                <span>PRD (In 8090 Refinery)</span>
                <div class="header-controls">
                    <button class="secondary-btn" onclick="pasteExample()">Example</button>
                </div>
            </div>
            <div class="pane-content">
                <textarea id="prdContent" class="input-textarea" placeholder="Enter or paste your PRD content here in Markdown or plain text format...

The PRD will be automatically augmented when you click 'Intake' on user stories in the left pane."></textarea>
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="previewModal" class="preview-modal">
        <div class="preview-container">
            <div class="preview-header">
                <h2>Preview Changes</h2>
                <div class="header-controls">
                    <button id="diffViewSideBtn" class="secondary-btn"
                        onclick="setDiffViewMode('side')">Side-by-side</button>
                    <button id="diffViewInlineBtn" class="secondary-btn"
                        onclick="setDiffViewMode('inline')">Inline</button>
                </div>
                <button class="close-preview-btn" onclick="closePreview()">×</button>
            </div>
            <div class="preview-content">
                <div class="preview-pane" id="previewPaneOriginal">
                    <div class="preview-pane-header" id="previewOriginalHeader">Current PRD</div>
                    <div id="previewOriginal" class="preview-pane-content"></div>
                </div>
                <div class="preview-pane" id="previewPaneProposed">
                    <div class="preview-pane-header" id="previewProposedHeader">Proposed PRD (with changes highlighted)
                    </div>
                    <div id="previewProposed" class="preview-pane-content"></div>
                </div>
            </div>
            <div class="preview-footer">
                <div class="preview-story-info" id="previewStoryInfo"></div>
                <div class="preview-actions">
                    <button class="reject-btn" onclick="rejectChanges()">Reject</button>
                    <button class="approve-btn" onclick="approveChanges()">Approve & Apply</button>
                </div>
            </div>
        </div>
    </div>

    <!-- App Modal Overlay (replaces alert/confirm/prompt) -->
    <div id="appModalOverlay" class="modal-overlay" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="appModalTitle">
            <div class="modal-header">
                <div class="modal-title" id="appModalTitle">Dialog</div>
                <button class="modal-close" onclick="__appModalClose('cancel')" aria-label="Close">×</button>
            </div>
            <div class="modal-body" id="appModalBody"></div>
            <div class="modal-footer" id="appModalFooter"></div>
        </div>
    </div>

    <script>
        let userStories = [];
        let storyIdCounter = 0;
        let currentPreviewData = null; // { storyId, originalPRD, proposedPRD }
        let __appModalResolver = null;
        let __appModalRejecter = null;
        let __appModalDefaultFocusId = null;

        function __appModalEscapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text == null ? '' : String(text);
            return div.innerHTML;
        }

        function __appModalClose(result) {
            const overlay = document.getElementById('appModalOverlay');
            overlay.classList.remove('active');
            overlay.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';

            const resolve = __appModalResolver;
            __appModalResolver = null;
            __appModalRejecter = null;
            __appModalDefaultFocusId = null;
            if (resolve) resolve(result);
        }

        function __appModalOpen({ title, bodyHtml, footerButtons, defaultFocusId }) {
            const overlay = document.getElementById('appModalOverlay');
            const titleEl = document.getElementById('appModalTitle');
            const bodyEl = document.getElementById('appModalBody');
            const footerEl = document.getElementById('appModalFooter');

            titleEl.textContent = title || 'Dialog';
            bodyEl.innerHTML = bodyHtml || '';
            footerEl.innerHTML = '';
            __appModalDefaultFocusId = defaultFocusId || null;

            (footerButtons || []).forEach(btn => {
                const b = document.createElement('button');
                b.className = `modal-btn ${btn.variant || 'secondary'}`;
                b.textContent = btn.label;
                b.addEventListener('click', () => __appModalClose(btn.result));
                footerEl.appendChild(b);
            });

            overlay.classList.add('active');
            overlay.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';

            setTimeout(() => {
                if (__appModalDefaultFocusId) {
                    const el = document.getElementById(__appModalDefaultFocusId);
                    if (el) el.focus();
                } else {
                    const firstInput = bodyEl.querySelector('input, textarea, button, a');
                    if (firstInput) firstInput.focus();
                }
            }, 0);
        }

        function showInfoModal({ title, message, details }) {
            const body = `
                <p>${__appModalEscapeHtml(message || '')}</p>
                ${details ? `<div class="modal-pre">${__appModalEscapeHtml(details)}</div>` : ''}
            `;
            return new Promise((resolve) => {
                __appModalResolver = resolve;
                __appModalOpen({
                    title: title || 'Info',
                    bodyHtml: body,
                    footerButtons: [{ label: 'OK', variant: 'primary', result: true }]
                });
            });
        }

        function showConfirmModal({ title, message, confirmText = 'Confirm', cancelText = 'Cancel', details }) {
            const body = `
                <p>${__appModalEscapeHtml(message || '')}</p>
                ${details ? `<div class="modal-pre">${__appModalEscapeHtml(details)}</div>` : ''}
            `;
            return new Promise((resolve) => {
                __appModalResolver = resolve;
                __appModalOpen({
                    title: title || 'Confirm',
                    bodyHtml: body,
                    footerButtons: [
                        { label: cancelText, variant: 'secondary', result: false },
                        { label: confirmText, variant: 'primary', result: true }
                    ]
                });
            });
        }

        function showFormModal({ title, descriptionHtml, fields, primaryText = 'Save', secondaryText = 'Cancel' }) {
            const formId = 'appModalForm';
            const defaultFocusId = fields?.[0]?.id || null;
            const formHtml = `
                ${descriptionHtml ? `<p>${descriptionHtml}</p>` : ''}
                <form id="${formId}" class="modal-form" onsubmit="return false;">
                    ${(fields || []).map(f => `
                        <div class="modal-field">
                            <label for="${f.id}">${__appModalEscapeHtml(f.label || '')}</label>
                            ${f.hint ? `<div class="modal-hint">${__appModalEscapeHtml(f.hint)}</div>` : ''}
                            ${f.type === 'textarea'
                    ? `<textarea id="${f.id}" placeholder="${__appModalEscapeHtml(f.placeholder || '')}">${__appModalEscapeHtml(f.value || '')}</textarea>`
                    : `<input id="${f.id}" type="${__appModalEscapeHtml(f.type || 'text')}" value="${__appModalEscapeHtml(f.value || '')}" placeholder="${__appModalEscapeHtml(f.placeholder || '')}">`
                }
                    </div>
                    `).join('')}
                </form>
            `;

            return new Promise((resolve) => {
                __appModalResolver = (result) => {
                    if (result !== 'submit') return resolve(null);
                    const values = {};
                    (fields || []).forEach(f => {
                        const el = document.getElementById(f.id);
                        values[f.name] = el ? el.value : '';
                    });
                    resolve(values);
                };
                __appModalOpen({
                    title: title || 'Settings',
                    bodyHtml: formHtml,
                    defaultFocusId,
                    footerButtons: [
                        { label: secondaryText, variant: 'secondary', result: null },
                        { label: primaryText, variant: 'primary', result: 'submit' }
                    ]
                });
            });
        }

        function showSelectModal({ title, descriptionHtml, label, options, value, primaryText = 'Continue', secondaryText = 'Cancel' }) {
            const selectId = 'appModalSelect';
            const bodyHtml = `
                ${descriptionHtml ? `<p>${descriptionHtml}</p>` : ''}
                <div class="modal-field">
                    <label for="${selectId}">${__appModalEscapeHtml(label || 'Select')}</label>
                    <select id="${selectId}" style="width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 0.75rem; font-size: 14px;">
                        ${(options || []).map(o => `<option value="${__appModalEscapeHtml(o.value)}"${o.value === value ? ' selected' : ''}>${__appModalEscapeHtml(o.label)}</option>`).join('')}
                    </select>
                </div>
            `;

            return new Promise((resolve) => {
                __appModalResolver = (result) => {
                    if (result !== 'submit') return resolve(null);
                    const el = document.getElementById(selectId);
                    resolve(el ? el.value : null);
                };
                __appModalOpen({
                    title: title || 'Select',
                    bodyHtml,
                    defaultFocusId: selectId,
                    footerButtons: [
                        { label: secondaryText, variant: 'secondary', result: null },
                        { label: primaryText, variant: 'primary', result: 'submit' }
                    ]
                });
            });
        }

        // Close modal on Escape, and when clicking outside
        document.addEventListener('keydown', (e) => {
            const overlay = document.getElementById('appModalOverlay');
            if (!overlay.classList.contains('active')) return;
            if (e.key === 'Escape') __appModalClose(null);
        });
        document.addEventListener('click', (e) => {
            const overlay = document.getElementById('appModalOverlay');
            if (!overlay.classList.contains('active')) return;
            if (e.target === overlay) __appModalClose(null);
        });

        // Load stories from localStorage on page load
        function loadStories() {
            const saved = localStorage.getItem('userStories');
            if (saved) {
                userStories = JSON.parse(saved);
                storyIdCounter = userStories.length > 0 ? Math.max(...userStories.map(s => s.id)) + 1 : 0;
                renderStories();
            }
        }

        // Save stories to localStorage
        function saveStories() {
            localStorage.setItem('userStories', JSON.stringify(userStories));
        }

        // Show modal to add a new user story
        async function showAddUserStoryModal() {
            const values = await showFormModal({
                title: 'Add User Story',
                descriptionHtml: 'Enter a new user story (e.g., "As a user, I want to be able to reset my password so that I can regain access to my account")',
                fields: [
                    {
                        id: 'newStoryInput',
                        name: 'storyText',
                        label: 'User Story',
                        value: '',
                        placeholder: 'Enter a new user story here...',
                        type: 'textarea'
                    }
                ],
                primaryText: 'Add Story',
                secondaryText: 'Cancel'
            });

            if (!values || !values.storyText) {
                return;
            }

            const storyText = values.storyText.trim();

            if (!storyText) {
                await showInfoModal({ title: 'Missing user story', message: 'Please enter a user story.' });
                return;
            }

            const story = {
                id: storyIdCounter++,
                text: storyText,
                intaken: false,
                createdAt: new Date().toISOString()
            };

            userStories.push(story);
            saveStories();
            renderStories();
        }

        // Add a new user story (kept for backward compatibility, but now calls modal)
        function addUserStory() {
            showAddUserStoryModal();
        }

        // Remove a user story
        function removeStory(storyId) {
            userStories = userStories.filter(s => s.id !== storyId);
            saveStories();
            renderStories();
        }

        // Intake a user story - augment the PRD
        async function intakeStory(storyId) {
            const story = userStories.find(s => s.id === storyId);
            if (!story || story.intaken) {
                return;
            }

            const prdContent = document.getElementById('prdContent').value.trim();
            if (!prdContent) {
                await showInfoModal({
                    title: 'Missing PRD',
                    message: 'Please enter PRD content in the right pane before intaking a story.'
                });
                return;
            }

            // Mark story as processing
            story.processing = true;
            renderStories();

            try {
                // Augment the PRD with the user story
                const augmentedPRD = await augmentPRD(prdContent, story.text);

                // Store preview data
                currentPreviewData = {
                    storyId: storyId,
                    originalPRD: prdContent,
                    proposedPRD: augmentedPRD,
                    storyText: story.text
                };

                // Show preview instead of directly applying
                showPreview(prdContent, augmentedPRD, story.text);

                // Mark story as no longer processing (but not intaken yet)
                story.processing = false;
                renderStories();
            } catch (error) {
                console.error('Intake failed:', error);
                await showInfoModal({
                    title: 'Intake failed',
                    message: 'Failed to intake story.',
                    details: error?.message || String(error)
                });
                story.processing = false;
                renderStories();
            }
        }

        // Augment PRD using the API
        async function augmentPRD(prdContent, userStory) {
            // Get API key from user
            let apiKey = localStorage.getItem('cerebras_api_key') || '';
            if (!apiKey) {
                const values = await showFormModal({
                    title: 'Cerebras API Key',
                    descriptionHtml: 'Enter your Cerebras API key (saved locally in your browser).',
                    fields: [
                        { id: 'cerebrasKeyInput', name: 'apiKey', label: 'API Key', value: apiKey, placeholder: 'Paste API key here', type: 'password' }
                    ],
                    primaryText: 'Save',
                    secondaryText: 'Cancel'
                });
                if (!values) throw new Error('No API key provided');
                apiKey = (values.apiKey || '').trim();
                if (!apiKey) throw new Error('No API key provided');
                localStorage.setItem('cerebras_api_key', apiKey);
            }

            if (!apiKey) {
                throw new Error('No API key provided');
            }

            const model = 'gpt-oss-120b';

            // Limit content to fit within token limits
            const maxContentLength = 5000; // ~1.25k tokens
            const reduced_content = prdContent.length > maxContentLength
                ? prdContent.slice(0, maxContentLength) + '\n\n[... content truncated due to length ...]'
                : prdContent;

            // Save API key for future use
            localStorage.setItem('cerebras_api_key', apiKey);

            const startTime = performance.now();

            const response = await fetch('https://api.cerebras.ai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: model,
                    messages: [
                        {
                            role: 'system',
                            content: 'You are an expert technical writer and product manager. Your task is to augment Product Requirements Documents (PRDs) based on user stories. When given a user story and an existing PRD, you should intelligently integrate the requirements from the user story into the PRD. Maintain the original structure and formatting (markdown) while adding or updating relevant sections. Only modify what is necessary to incorporate the user story. Return the complete, augmented PRD document. Ensure that your work is as minimal, concise, and to the point as possible. No inventing requirements and items which are not present in the user story or the PRD.'
                        },
                        {
                            role: 'user',
                            content: `Here is the current PRD:\n\n${reduced_content}\n\n\nUser story to incorporate: ${userStory}\n\nPlease provide the complete augmented PRD with the user story requirements integrated. Return the full document, not just the changes. Maintain all original formatting and structure.`
                        }
                    ],
                    max_tokens: 8000,
                    temperature: 0.3
                })
            });

            const endTime = performance.now();
            const responseTimeMs = Math.round(endTime - startTime);

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(`API request failed: ${response.status} - ${errorData.error?.message || 'Unknown error'}`);
            }

            const data = await response.json();

            console.group('🤖 Cerebras API Response Debug');
            console.log('📊 Complete API Response:', data);
            console.log('⏱️  Response Time:', responseTimeMs + 'ms');
            console.groupEnd();

            return data.choices[0].message.content;
        }

        // Render the list of user stories
        function renderStories() {
            const container = document.getElementById('todoItems');

            if (userStories.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No User Stories Yet</h3>
                        <p>Click "Add User Story" below to add stories, then click "Intake" on each story to augment the PRD.</p>
                    </div>
                    <div style="padding: 16px; border-top: 1px solid var(--border);">
                        <button class="add-todo-btn" onclick="showAddUserStoryModal()" style="width: 100%;">Add User Story</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = userStories.map(story => {
                const itemClass = `todo-item ${story.intaken ? 'intaken' : ''} ${story.processing ? 'processing' : ''}`;
                return `
                    <div class="${itemClass}">
                        <div class="todo-content">${escapeHtml(story.text)}</div>
                        <div class="todo-actions">
                            ${story.intaken ? '<span class="todo-status">✓ Intaken</span>' : ''}
                            <button class="intake-btn" onclick="intakeStory(${story.id})" ${story.intaken || story.processing ? 'disabled' : ''}>
                                ${story.processing ? 'Processing...' : 'Intake'}
                            </button>
                            <button class="remove-btn" onclick="removeStory(${story.id})" ${story.processing ? 'disabled' : ''}>Remove</button>
                        </div>
                    </div>
                `;
            }).join('') + `
                <div style="padding: 16px; border-top: 1px solid var(--border);">
                    <button class="add-todo-btn" onclick="showAddUserStoryModal()" style="width: 100%;">Add User Story</button>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function manageApiKey() {
            const currentKey = localStorage.getItem('cerebras_api_key') || '';
            const hasKey = Boolean(currentKey);

            const action = await showConfirmModal({
                title: 'Cerebras API Key',
                message: hasKey
                    ? 'API key is currently set. Do you want to update it?'
                    : 'No API key set. Do you want to add one?',
                confirmText: hasKey ? 'Update' : 'Add',
                cancelText: 'Cancel'
            });

            if (!action) return;

            const values = await showFormModal({
                title: 'Cerebras API Key',
                descriptionHtml: 'Paste your Cerebras API key below. Leave blank and click “Save” to remove it.',
                fields: [
                    {
                        id: 'cerebrasKeyManage',
                        name: 'apiKey',
                        label: 'API Key',
                        value: currentKey,
                        placeholder: 'Paste API key here',
                        type: 'password'
                    }
                ],
                primaryText: 'Save',
                secondaryText: 'Cancel'
            });

            if (!values) return;

            const nextKey = (values.apiKey || '').trim();
            if (nextKey) {
                localStorage.setItem('cerebras_api_key', nextKey);
                await showInfoModal({ title: 'Saved', message: 'API key saved successfully.' });
            } else {
                localStorage.removeItem('cerebras_api_key');
                await showInfoModal({ title: 'Removed', message: 'API key removed.' });
            }
        }

        function getTrelloConfig() {
            return {
                apiKey: localStorage.getItem('trello_api_key') || '',
                apiToken: localStorage.getItem('trello_api_token') || '',
                apiSecret: localStorage.getItem('trello_api_secret') || '',
                boardId: localStorage.getItem('trello_board_id') || ''
            };
        }

        function clearTrelloConfig() {
            localStorage.removeItem('trello_api_key');
            localStorage.removeItem('trello_api_token');
            localStorage.removeItem('trello_api_secret');
            localStorage.removeItem('trello_board_id');
            localStorage.removeItem('trello_last_sync');
        }

        async function manageTrello() {
            const cfg = getTrelloConfig();
            const hasAny = Boolean(cfg.apiKey || cfg.apiToken || cfg.boardId || cfg.apiSecret);

            const action = await showConfirmModal({
                title: 'Trello Settings',
                message: hasAny
                    ? 'Trello connection info is set. Do you want to update it?'
                    : 'No Trello connection info set. Do you want to add it?',
                confirmText: hasAny ? 'Update' : 'Add',
                cancelText: 'Cancel'
            });

            if (!action) return;

            const authUrl = `https://trello.com/1/authorize?expiration=never&scope=read&response_type=token&name=PRD%20Changer%20via%20Stories&key=${encodeURIComponent(cfg.apiKey || '')}`;
            const values = await showFormModal({
                title: 'Trello Connection',
                descriptionHtml: `Enter Trello connection details.<br><br><strong>Note:</strong> This app can read <em>public</em> boards with just API Key + Board ID. For <em>private</em> boards, Trello requires an API Token.<br><br><strong>Token help:</strong> open <a href="${authUrl}" target="_blank" rel="noopener">this Trello authorize link</a> (update the key first), then paste the generated token.`,
                fields: [
                    { id: 'trelloKey', name: 'apiKey', label: 'API Key', value: cfg.apiKey, placeholder: 'Trello API key', type: 'text' },
                    { id: 'trelloSecret', name: 'apiSecret', label: 'API Secret (optional; not used in this browser app)', value: cfg.apiSecret, placeholder: '(optional)', type: 'text' },
                    { id: 'trelloToken', name: 'apiToken', label: 'API Token (only needed for private boards)', value: cfg.apiToken, placeholder: '(optional for public boards)', type: 'password' },
                    { id: 'trelloBoard', name: 'boardId', label: 'Board ID (required for Sync)', value: cfg.boardId, placeholder: 'e.g. 5abbe4b7ddc1b351ef961414', type: 'text' }
                ],
                primaryText: 'Save',
                secondaryText: 'Cancel'
            });

            if (!values) return;

            const apiKey = (values.apiKey || '').trim();
            const apiToken = (values.apiToken || '').trim();
            const apiSecret = (values.apiSecret || '').trim();
            const boardId = (values.boardId || '').trim();

            if (!apiKey && !apiToken && !apiSecret && !boardId) {
                const clear = await showConfirmModal({
                    title: 'Clear Trello Settings?',
                    message: 'All fields are empty. Do you want to clear Trello settings?',
                    confirmText: 'Clear',
                    cancelText: 'Cancel'
                });
                if (clear) {
                    clearTrelloConfig();
                    await showInfoModal({ title: 'Cleared', message: 'Trello settings cleared.' });
                }
                return;
            }

            localStorage.setItem('trello_api_key', apiKey);
            localStorage.setItem('trello_api_token', apiToken);
            localStorage.setItem('trello_api_secret', apiSecret);
            localStorage.setItem('trello_board_id', boardId);

            await showInfoModal({ title: 'Saved', message: 'Trello settings saved. Click “Sync” to choose a board list and import cards into the TODO list.' });
        }

        async function syncFromTrello() {
            let cfg = getTrelloConfig();
            if (!cfg.apiKey || !cfg.boardId) {
                await manageTrello();
                cfg = getTrelloConfig();
            }

            if (!cfg.apiKey || !cfg.boardId) {
                await showInfoModal({
                    title: 'Missing Trello Settings',
                    message: 'Need at least API Key and Board ID before syncing.'
                });
                return;
            }

            // Fetch lists on the board and let user pick one each time.
            const listsUrl = new URL(`https://api.trello.com/1/boards/${encodeURIComponent(cfg.boardId)}/lists`);
            listsUrl.searchParams.set('key', cfg.apiKey);
            if (cfg.apiToken) listsUrl.searchParams.set('token', cfg.apiToken);
            listsUrl.searchParams.set('filter', 'open');
            listsUrl.searchParams.set('fields', 'id,name,pos');

            let listsRes = await fetch(listsUrl.toString(), { method: 'GET' });
            if (!listsRes.ok && (listsRes.status === 401 || listsRes.status === 403) && !cfg.apiToken) {
                // Likely a private board: prompt for token on-demand, then retry.
                const tokenUrl = `https://trello.com/1/authorize?expiration=never&scope=read&response_type=token&name=PRD%20Changer%20via%20Stories&key=${encodeURIComponent(cfg.apiKey)}`;
                const values = await showFormModal({
                    title: 'Trello Token Required',
                    descriptionHtml: `This Trello board appears to require authentication (private board).<br><br>Open <a href="${tokenUrl}" target="_blank" rel="noopener">this authorize link</a>, then paste the token below.`,
                    fields: [
                        { id: 'trelloTokenOnDemand', name: 'apiToken', label: 'API Token', value: '', placeholder: 'Paste token here', type: 'password' }
                    ],
                    primaryText: 'Save & Retry',
                    secondaryText: 'Cancel'
                });
                if (!values) return;
                const token = (values.apiToken || '').trim();
                if (!token) return;
                localStorage.setItem('trello_api_token', token);
                cfg = getTrelloConfig();

                const retryUrl = new URL(`https://api.trello.com/1/boards/${encodeURIComponent(cfg.boardId)}/lists`);
                retryUrl.searchParams.set('key', cfg.apiKey);
                retryUrl.searchParams.set('token', cfg.apiToken);
                retryUrl.searchParams.set('filter', 'open');
                retryUrl.searchParams.set('fields', 'id,name,pos');
                listsRes = await fetch(retryUrl.toString(), { method: 'GET' });
            }

            if (!listsRes.ok) {
                const errText = await listsRes.text().catch(() => '');
                await showInfoModal({
                    title: 'Trello Sync Failed',
                    message: 'Failed to fetch lists for the board.',
                    details: `${listsRes.status} ${listsRes.statusText}${errText ? `\n\n${errText}` : ''}`
                });
                return;
            }

            const lists = await listsRes.json();
            if (!Array.isArray(lists) || lists.length === 0) {
                await showInfoModal({
                    title: 'No lists found',
                    message: 'No open lists found on that Trello board.'
                });
                return;
            }

            const sortedLists = [...lists].sort((a, b) => (a.pos ?? 0) - (b.pos ?? 0));
            const listOptions = sortedLists.map((l, idx) => ({
                value: l.id,
                label: `${idx + 1}. ${l.name || '(untitled list)'}`
            }));

            const chosenListId = await showSelectModal({
                title: 'Pick a Trello List',
                descriptionHtml: 'Select which list to sync cards from (this is asked every time you press Sync).',
                label: 'Board Lists',
                options: listOptions,
                value: listOptions[0]?.value,
                primaryText: 'Sync this list',
                secondaryText: 'Cancel'
            });

            if (!chosenListId) return;

            const willReplace = userStories.length > 0;
            if (willReplace) {
                const ok = await showConfirmModal({
                    title: 'Replace TODO list?',
                    message: 'Sync will replace the current TODO list with the cards from the Trello List. Continue?',
                    confirmText: 'Replace & Sync',
                    cancelText: 'Cancel'
                });
                if (!ok) return;
            }

            const syncBtn = document.getElementById('trelloSyncBtn');
            const prevBtnText = syncBtn ? syncBtn.textContent : '';
            if (syncBtn) {
                syncBtn.disabled = true;
                syncBtn.textContent = 'Syncing...';
            }

            try {
                const url = new URL(`https://api.trello.com/1/lists/${encodeURIComponent(chosenListId)}/cards`);
                url.searchParams.set('key', cfg.apiKey);
                if (cfg.apiToken) url.searchParams.set('token', cfg.apiToken);
                url.searchParams.set('filter', 'open');
                url.searchParams.set('fields', 'id,name,desc,shortUrl,dateLastActivity');

                const res = await fetch(url.toString(), { method: 'GET' });
                if (!res.ok) {
                    const errText = await res.text().catch(() => '');
                    throw new Error(`Trello request failed: ${res.status} ${res.statusText}${errText ? ` - ${errText}` : ''}`);
                }

                const cards = await res.json();
                if (!Array.isArray(cards)) {
                    throw new Error('Unexpected Trello response (expected an array of cards).');
                }

                // Preserve existing intaken status by matching on trelloCardId when possible.
                const existingByCardId = new Map(
                    userStories
                        .filter(s => s && s.trelloCardId)
                        .map(s => [s.trelloCardId, s])
                );

                const nextStories = [];
                for (const card of cards) {
                    const name = (card?.name || '').trim();
                    const desc = (card?.desc || '').trim();
                    const text = desc ? `${name}\n\n${desc}` : name;

                    const existing = existingByCardId.get(card.id);
                    if (existing) {
                        nextStories.push({
                            ...existing,
                            text,
                            trelloCardId: card.id,
                            trelloUrl: card.shortUrl,
                            trelloLastActivity: card.dateLastActivity
                        });
                    } else {
                        nextStories.push({
                            id: storyIdCounter++,
                            text,
                            intaken: false,
                            createdAt: new Date().toISOString(),
                            trelloCardId: card.id,
                            trelloUrl: card.shortUrl,
                            trelloLastActivity: card.dateLastActivity
                        });
                    }
                }

                userStories = nextStories;
                saveStories();
                renderStories();
                localStorage.setItem('trello_last_sync', new Date().toISOString());

                await showInfoModal({
                    title: 'Trello Sync Complete',
                    message: `Synced ${cards.length} Trello card(s) into the TODO list.`
                });
            } catch (e) {
                console.error('Trello sync failed:', e);
                await showInfoModal({
                    title: 'Trello Sync Failed',
                    message: 'Trello sync failed.',
                    details: e?.message || String(e)
                });
            } finally {
                if (syncBtn) {
                    syncBtn.disabled = false;
                    syncBtn.textContent = prevBtnText || 'Sync';
                }
            }
        }

        function getExamplePRD() {
            return `# Timesheet & Labor-Costing System for Multi-Crew Construction Firms

## Context

A mid-sized construction company runs several projects in parallel, each staffed by a dedicated field crew. Labor is its single largest variable cost, yet the firm still relies on paper timesheets and ad-hoc spreadsheets. Field workers punch time inconsistently, cost codes are applied late (if at all), and payroll must chase missing hours every Monday. Project managers only see labor over-runs weeks after they happen, when it's too late to course-correct. The business needs a single, job-site-friendly system that captures hours once, tags them with the right cost information, and surfaces real-time labor performance to both operations and finance.

## Problem Statement

Create a lightweight timesheet platform that:
1. Captures hours in the field without friction—whether via individual punches or a bulk crew sheet.
2. Attaches accurate cost code, phase, and activity tags at the moment of entry to feed job-costing and earned-value analysis.
3. Enforces a clear, auditable approval workflow that fits projects of different complexity.
4. Supports fast corrections while maintaining a full version history for compliance.
5. Delivers instant visibility into actual vs. budgeted labor so superintendents and PMs can act before costs escalate.

## Implemented Features

### User Management
- Role-based access control with Worker, Crew Admin, Superintendent, Project Manager, Payroll, and Admin roles
- Bulk user upload via CSV for efficient onboarding of crews
- Active/inactive user status management
- Secure password hashing and authentication

### Project & Cost Code Management
- Project creation with budget hours, start/end dates
- Cost code setup with budget hours, phase, and activity tracking
- Project-specific cost codes for accurate job costing
- Active/inactive status management for projects and cost codes

### Crew Management
- Crew creation and assignment to projects
- Supervisor assignment (Crew Admin or Superintendent)
- Flexible crew membership management
- Active/inactive status for crews and members

### Timesheet Entry
- Individual timesheet entries with hours and overtime
- Bulk timesheet upload via CSV for efficient data entry
- Required cost code assignment for accurate job costing
- Description field for detailed activity tracking
- Automatic timesheet creation based on date and crew

### Approval Workflow
- Multi-step approval process:
  1. Draft → Pending Superintendent
  2. Pending Superintendent → Pending PM
  3. Pending PM → Pending Payroll
  4. Pending Payroll → Approved
- Bulk approval capability for efficient processing
- Full approval history tracking
- Role-based approval permissions
- Ability to submit all draft timesheets at once

### Labor Dashboard
- Real-time labor summary by cost code
- Project filtering for focused analysis
- Date range selection for period analysis
- Visual charts:
  - Labor hours by cost code (regular vs overtime)
  - Budget vs actual comparison
- Detailed labor summary table with:
  - Cost code details
  - Budget hours
  - Actual hours
  - Overtime hours
  - Variance tracking
  - Utilization percentage
- Color-coded variance indicators

### Data Model
- Implemented tables:
  - users
  - projects
  - crews
  - crew_members
  - cost_codes
  - timesheets
  - timesheet_entries
  - approvals
  - timesheet_versions

`;
        }

        function pasteExample() {
            const examplePRD = getExamplePRD();
            document.getElementById('prdContent').value = examplePRD;
            document.getElementById('prdContent').focus();
        }

        // Show preview modal with diff
        function showPreview(originalPRD, proposedPRD, storyText) {
            const modal = document.getElementById('previewModal');
            const storyInfo = document.getElementById('previewStoryInfo');

            // Set story info
            storyInfo.textContent = `User Story: ${storyText}`;

            __lastPreviewPayload = { originalPRD, proposedPRD, storyText };
            // Render based on current view mode
            renderPreviewDiff();

            // Show modal
            modal.classList.add('active');
        }

        function renderWordDiffHtml(originalText, proposedText) {
            // diffWords ignores whitespace differences by design (including newlines/spaces-only edits),
            // while still preserving the original whitespace in the returned segments.
            const parts = window.Diff.diffWords(originalText, proposedText);
            return parts.map(part => {
                const safe = escapeHtml(part.value);
                if (part.added) return `<span class="diff-token added">${safe}</span>`;
                if (part.removed) return `<span class="diff-token removed">${safe}</span>`;
                return safe;
            }).join('');
        }

        let __isPreviewScrollSyncing = false;
        let __diffViewMode = localStorage.getItem('diff_view_mode') || 'side';
        let __lastPreviewPayload = null;

        function setDiffViewMode(mode) {
            __diffViewMode = mode === 'inline' ? 'inline' : 'side';
            localStorage.setItem('diff_view_mode', __diffViewMode);
            updateDiffViewButtons();
            renderPreviewDiff();
        }

        function updateDiffViewButtons() {
            const sideBtn = document.getElementById('diffViewSideBtn');
            const inlineBtn = document.getElementById('diffViewInlineBtn');
            if (!sideBtn || !inlineBtn) return;
            sideBtn.classList.toggle('active', __diffViewMode === 'side');
            inlineBtn.classList.toggle('active', __diffViewMode === 'inline');
        }

        function unlinkPreviewScroll() {
            const left = document.getElementById('previewOriginal');
            const right = document.getElementById('previewProposed');
            if (left?.__linkedScrollHandler) left.removeEventListener('scroll', left.__linkedScrollHandler);
            if (right?.__linkedScrollHandler) right.removeEventListener('scroll', right.__linkedScrollHandler);
            if (left) left.__linkedScrollHandler = null;
            if (right) right.__linkedScrollHandler = null;
        }

        function renderPreviewDiff() {
            if (!__lastPreviewPayload) return;

            updateDiffViewButtons();

            const { originalPRD, proposedPRD } = __lastPreviewPayload;
            const originalPane = document.getElementById('previewPaneOriginal');
            const proposedPane = document.getElementById('previewPaneProposed');
            const originalHeader = document.getElementById('previewOriginalHeader');
            const proposedHeader = document.getElementById('previewProposedHeader');
            const originalDiv = document.getElementById('previewOriginal');
            const proposedDiv = document.getElementById('previewProposed');

            if (!originalPane || !proposedPane || !originalDiv || !proposedDiv) return;

            if (__diffViewMode === 'inline') {
                // Inline: show one pane with a continuous diff
                originalPane.style.display = 'none';
                proposedPane.style.flex = '1';
                if (proposedHeader) proposedHeader.textContent = 'Inline diff (Current → Proposed)';
                if (originalHeader) originalHeader.textContent = 'Current PRD';

                unlinkPreviewScroll();
                originalDiv.textContent = '';

                if (window.Diff && typeof window.Diff.diffWords === 'function') {
                    proposedDiv.innerHTML = renderWordDiffHtml(originalPRD, proposedPRD);
                } else {
                    const diff = computeDiff(originalPRD.split('\n'), proposedPRD.split('\n'));
                    proposedDiv.innerHTML = diff.map((line) => {
                        if (line.type === 'added') return `<div class="diff-line added">${escapeHtml(line.proposed || '')}</div>`;
                        if (line.type === 'removed') return `<div class="diff-line removed">${escapeHtml(line.original || '')}</div>`;
                        if (line.type === 'modified') {
                            return `<div class="diff-line removed">${escapeHtml(line.original || '')}</div><div class="diff-line added">${escapeHtml(line.proposed || '')}</div>`;
                        }
                        return `<div class="diff-line unchanged">${escapeHtml(line.proposed || '')}</div>`;
                    }).join('');
                }
            } else {
                // Side-by-side (current behavior)
                originalPane.style.display = 'flex';
                proposedPane.style.flex = '1';
                if (originalHeader) originalHeader.textContent = 'Current PRD';
                if (proposedHeader) proposedHeader.textContent = 'Proposed PRD (with changes highlighted)';

                // Prefer robust word-level diff that ignores whitespace + newline-only changes.
                // Fallback to the legacy line-based diff if the library isn't available.
                if (window.Diff && typeof window.Diff.diffWords === 'function') {
                    originalDiv.textContent = originalPRD;
                    proposedDiv.innerHTML = renderWordDiffHtml(originalPRD, proposedPRD);
                } else {
                    const diff = computeDiff(originalPRD.split('\n'), proposedPRD.split('\n'));

                    originalDiv.innerHTML = diff.map((line) => {
                        const lineClass = line.type === 'removed' ? 'removed' : line.type === 'modified' ? 'removed' : 'unchanged';
                        const lineNum = line.origLineNum ? line.origLineNum : '';
                        return `<div class="diff-line ${lineClass}"><span class="diff-line-number">${lineNum}</span>${escapeHtml(line.original || '')}</div>`;
                    }).join('');

                    proposedDiv.innerHTML = diff.map((line) => {
                        const lineClass = line.type === 'added' ? 'added' : line.type === 'modified' ? 'added' : 'unchanged';
                        const lineNum = line.propLineNum ? line.propLineNum : '';
                        return `<div class="diff-line ${lineClass}"><span class="diff-line-number">${lineNum}</span>${escapeHtml(line.proposed || '')}</div>`;
                    }).join('');
                }

                linkPreviewScroll();
            }
        }

        function linkPreviewScroll() {
            const left = document.getElementById('previewOriginal');
            const right = document.getElementById('previewProposed');
            if (!left || !right) return;

            // Detach old handlers if present (avoid stacking listeners)
            if (left.__linkedScrollHandler) left.removeEventListener('scroll', left.__linkedScrollHandler);
            if (right.__linkedScrollHandler) right.removeEventListener('scroll', right.__linkedScrollHandler);

            const syncScroll = (fromEl, toEl) => {
                const fromMax = Math.max(1, fromEl.scrollHeight - fromEl.clientHeight);
                const toMax = Math.max(1, toEl.scrollHeight - toEl.clientHeight);
                const ratio = fromEl.scrollTop / fromMax;
                toEl.scrollTop = ratio * toMax;
            };

            left.__linkedScrollHandler = () => {
                if (__isPreviewScrollSyncing) return;
                __isPreviewScrollSyncing = true;
                requestAnimationFrame(() => {
                    syncScroll(left, right);
                    __isPreviewScrollSyncing = false;
                });
            };

            right.__linkedScrollHandler = () => {
                if (__isPreviewScrollSyncing) return;
                __isPreviewScrollSyncing = true;
                requestAnimationFrame(() => {
                    syncScroll(right, left);
                    __isPreviewScrollSyncing = false;
                });
            };

            left.addEventListener('scroll', left.__linkedScrollHandler, { passive: true });
            right.addEventListener('scroll', right.__linkedScrollHandler, { passive: true });
        }

        // Compute diff between two text arrays
        function computeDiff(originalLines, proposedLines) {
            const diff = [];
            let origIdx = 0;
            let propIdx = 0;

            while (origIdx < originalLines.length || propIdx < proposedLines.length) {
                const origLine = originalLines[origIdx];
                const propLine = proposedLines[propIdx];

                if (origIdx >= originalLines.length) {
                    // Only proposed lines remain
                    diff.push({
                        type: 'added',
                        original: '',
                        proposed: propLine,
                        origLineNum: null,
                        propLineNum: propIdx + 1
                    });
                    propIdx++;
                } else if (propIdx >= proposedLines.length) {
                    // Only original lines remain
                    diff.push({
                        type: 'removed',
                        original: origLine,
                        proposed: '',
                        origLineNum: origIdx + 1,
                        propLineNum: null
                    });
                    origIdx++;
                } else if (origLine === propLine) {
                    // Lines match
                    diff.push({
                        type: 'unchanged',
                        original: origLine,
                        proposed: propLine,
                        origLineNum: origIdx + 1,
                        propLineNum: propIdx + 1
                    });
                    origIdx++;
                    propIdx++;
                } else {
                    // Lines differ - try to find next match
                    const nextOrigMatch = findNextMatch(originalLines, origIdx, propLine);
                    const nextPropMatch = findNextMatch(proposedLines, propIdx, origLine);

                    if (nextOrigMatch !== -1 && (nextPropMatch === -1 || nextOrigMatch - origIdx <= nextPropMatch - propIdx)) {
                        // Original has the matching line closer
                        while (origIdx < nextOrigMatch) {
                            diff.push({
                                type: 'removed',
                                original: originalLines[origIdx],
                                proposed: '',
                                origLineNum: origIdx + 1,
                                propLineNum: null
                            });
                            origIdx++;
                        }
                        diff.push({
                            type: 'unchanged',
                            original: originalLines[origIdx],
                            proposed: propLine,
                            origLineNum: origIdx + 1,
                            propLineNum: propIdx + 1
                        });
                        origIdx++;
                        propIdx++;
                    } else if (nextPropMatch !== -1) {
                        // Proposed has the matching line closer
                        while (propIdx < nextPropMatch) {
                            diff.push({
                                type: 'added',
                                original: '',
                                proposed: proposedLines[propIdx],
                                origLineNum: null,
                                propLineNum: propIdx + 1
                            });
                            propIdx++;
                        }
                        diff.push({
                            type: 'unchanged',
                            original: origLine,
                            proposed: proposedLines[propIdx],
                            origLineNum: origIdx + 1,
                            propLineNum: propIdx + 1
                        });
                        origIdx++;
                        propIdx++;
                    } else {
                        // No match found - treat as modified
                        diff.push({
                            type: 'modified',
                            original: origLine,
                            proposed: propLine,
                            origLineNum: origIdx + 1,
                            propLineNum: propIdx + 1
                        });
                        origIdx++;
                        propIdx++;
                    }
                }

            }

            return diff;
        }

        function findNextMatch(lines, startIdx, targetLine) {
            for (let i = startIdx + 1; i < lines.length; i++) {
                if (lines[i] === targetLine) {
                    return i;
                }
            }
            return -1;
        }

        // Approve changes and apply to PRD
        function approveChanges() {
            if (!currentPreviewData) {
                return;
            }

            const story = userStories.find(s => s.id === currentPreviewData.storyId);
            if (story) {
                // Update the PRD content
                document.getElementById('prdContent').value = currentPreviewData.proposedPRD;

                // Mark story as intaken
                story.intaken = true;
                saveStories();
                renderStories();
            }

            // Close preview
            closePreview();
        }

        // Reject changes
        function rejectChanges() {
            closePreview();
        }

        // Close preview modal
        function closePreview() {
            const modal = document.getElementById('previewModal');
            modal.classList.remove('active');
            currentPreviewData = null;
            __lastPreviewPayload = null;
            unlinkPreviewScroll();
        }

        // Close preview on escape key
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('previewModal');
                if (modal.classList.contains('active')) {
                    closePreview();
                }
            }
        });

        // Close preview when clicking outside
        document.getElementById('previewModal').addEventListener('click', function (e) {
            if (e.target === this) {
                closePreview();
            }
        });


        // Hamburger menu functions
        function toggleMenu() {
            const menu = document.getElementById('settingsMenu');
            if (menu) {
                menu.classList.toggle('active');
            }
        }

        function closeMenu() {
            const menu = document.getElementById('settingsMenu');
            if (menu) {
                menu.classList.remove('active');
            }
        }

        // Close menu when clicking outside
        document.addEventListener('click', function (e) {
            const menu = document.getElementById('settingsMenu');
            const hamburger = document.querySelector('.hamburger-menu');
            if (menu && hamburger && !hamburger.contains(e.target)) {
                menu.classList.remove('active');
            }
        });

        // Load stories on page load
        loadStories();

        // Prefill PRD with example text on page load
        (function() {
            const prdContent = document.getElementById('prdContent');
            if (prdContent && !prdContent.value.trim()) {
                prdContent.value = getExamplePRD();
            }
        })();
    </script>
